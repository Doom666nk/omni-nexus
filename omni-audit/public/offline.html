<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OMNI-NEXUS — Hors ligne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh;
      background: #050a05;
      color: #deff9a;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 24px;
      text-align: center;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #deff9a;
    }
    p {
      font-size: 12px;
      color: #4a5a4a;
      letter-spacing: 3px;
    }
    button {
      background: #deff9a;
      color: #050a05;
      font-family: monospace;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 2px;
      padding: 14px 28px;
      border: none;
      cursor: pointer;
    }
    button:hover { background: #c8e87a; }
  </style>
</head>
<body>
  <div class="container">
    <svg width="80" height="80" viewBox="0 0 512 512" aria-hidden="true">
      <rect width="512" height="512" fill="#050a05"/>
      <polygon points="256,40 472,256 256,472 40,256" fill="#0d1a0d" stroke="#deff9a" stroke-width="16"/>
      <text x="256" y="290" text-anchor="middle" fill="#deff9a" font-size="120" font-weight="700" font-family="monospace" letter-spacing="8">ON</text>
    </svg>
    <h1>OMNI-NEXUS</h1>
    <p>CONNEXION INTERROMPUE</p>
    <button onclick="window.location.reload()">RECONNECTER</button>
  </div>
</body>
</html>
